<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shipment Editor</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        .mono {
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        }
    </style>
</head>

<body class="bg-[#f7f1f1] min-h-screen text-[#1c1113]">

    <header class="bg-[#140a0d] text-[#f7ecec]">
        <div class="max-w-5xl mx-auto px-6 py-5 flex items-center justify-between">
            <div>
                <p class="text-xs uppercase tracking-widest text-[#a67b82] mono">Shipment</p>
                <h1 class="text-2xl font-semibold" id="shipment-title">Edit Shipment <span class="mono text-[#a67b82]"
                        id="shipment-id-label">#—</span></h1>
            </div>
            <div class="text-right text-sm text-[#a67b82]">
                <p>Status</p>
                <p class="text-[#ff4d6d] font-medium" id="shipment-status">In progress</p>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-6 py-8 space-y-8">

        <form id="shipment-form" class="bg-white rounded-lg border border-[#e8d9da] shadow-sm">
            <div class="px-6 py-4 border-b border-[#e8d9da] flex items-center justify-between">
                <h2 class="font-semibold text-[#170b0d]">Shipment details</h2>
                <span class="text-xs text-[#a67b82] mono">shipments</span>
            </div>

            <div class="p-6 grid grid-cols-1 sm:grid-cols-2 gap-x-6 gap-y-5">

                <div>
                    <label class="block text-sm font-medium text-[#3a2226] mb-1" for="document_language">Document
                        language</label>
                    <select id="document_language" name="document_language"
                        class="w-full rounded-md border border-[#d9c3c5] px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#b3122f] focus:border-[#b3122f]">
                        <option value="">Select language</option>
                        <option value="en">English</option>
                        <option value="nl">Dutch</option>
                        <option value="fr">French</option>
                        <option value="de">German</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-[#3a2226] mb-1" for="instruction_type">
                        Instruction type <span class="text-[#b3122f]">*</span>
                    </label>
                    <select id="instruction_type" name="instruction_type" required
                        class="w-full rounded-md border border-[#d9c3c5] px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#b3122f] focus:border-[#b3122f]">
                        <option value="">Select type</option>
                        <option value="load">Load</option>
                        <option value="unload">Unload</option>
                        <option value="load_unload">Load &amp; unload</option>
                        <option value="transfer">Transfer</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-[#3a2226] mb-1" for="car_id">
                        Car ID <span class="text-[#b3122f]">*</span>
                    </label>
                    <input id="car_id" name="car_id" type="text" required placeholder="e.g. TRK-2291"
                        class="w-full rounded-md border border-[#d9c3c5] px-3 py-2 text-sm mono focus:outline-none focus:ring-2 focus:ring-[#b3122f] focus:border-[#b3122f]" />
                </div>

                <div>
                    <label class="block text-sm font-medium text-[#3a2226] mb-1" for="driver_id">
                        Driver ID <span class="text-[#b3122f]">*</span>
                    </label>
                    <input id="driver_id" name="driver_id" type="text" required placeholder="e.g. DRV-1042"
                        class="w-full rounded-md border border-[#d9c3c5] px-3 py-2 text-sm mono focus:outline-none focus:ring-2 focus:ring-[#b3122f] focus:border-[#b3122f]" />
                </div>

                <div>
                    <label class="block text-sm font-medium text-[#3a2226] mb-1" for="container">Container</label>
                    <input id="container" name="container" type="text" placeholder="Container number"
                        class="w-full rounded-md border border-[#d9c3c5] px-3 py-2 text-sm mono focus:outline-none focus:ring-2 focus:ring-[#b3122f] focus:border-[#b3122f]" />
                </div>

                <div>
                    <label class="block text-sm font-medium text-[#3a2226] mb-1" for="chassis">Chassis</label>
                    <input id="chassis" name="chassis" type="text" placeholder="Chassis number"
                        class="w-full rounded-md border border-[#d9c3c5] px-3 py-2 text-sm mono focus:outline-none focus:ring-2 focus:ring-[#b3122f] focus:border-[#b3122f]" />
                </div>

                <div>
                    <label class="block text-sm font-medium text-[#3a2226] mb-1" for="started">Started</label>
                    <input id="started" name="started" type="datetime-local"
                        class="w-full rounded-md border border-[#d9c3c5] px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#b3122f] focus:border-[#b3122f]" />
                </div>

                <div>
                    <label class="block text-sm font-medium text-[#3a2226] mb-1" for="finished">Finished</label>
                    <input id="finished" name="finished" type="datetime-local"
                        class="w-full rounded-md border border-[#d9c3c5] px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#b3122f] focus:border-[#b3122f]" />
                </div>

                <div class="sm:col-span-2">
                    <label class="block text-sm font-medium text-[#3a2226] mb-1" for="tankdetails">Tank details</label>
                    <textarea id="tankdetails" name="tankdetails" rows="2"
                        placeholder="Compartments, cleaning status, previous cargo…"
                        class="w-full rounded-md border border-[#d9c3c5] px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#b3122f] focus:border-[#b3122f]"></textarea>
                </div>

                <div class="sm:col-span-2">
                    <label class="block text-sm font-medium text-[#3a2226] mb-1" for="generalremark">General
                        remark</label>
                    <textarea id="generalremark" name="generalremark" rows="2"
                        placeholder="Any general notes about this shipment…"
                        class="w-full rounded-md border border-[#d9c3c5] px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#b3122f] focus:border-[#b3122f]"></textarea>
                </div>

            </div>
        </form>

        <!-- TASKS -->
        <section class="space-y-4">
            <div class="flex items-center justify-between">
                <div>
                    <h2 class="font-semibold text-[#170b0d] text-lg">Tasks</h2>
                    <p class="text-sm text-[#6b4a4e]">Load and unload legs attached to this shipment.</p>
                </div>
                <button type="button" id="add-task"
                    class="inline-flex items-center gap-1.5 rounded-md bg-[#140a0d] text-white text-sm font-medium px-4 py-2 hover:bg-[#3a1016] transition-colors">
                    <span class="text-lg leading-none">+</span> Add task
                </button>
            </div>

            <div id="tasks-container" class="space-y-4"></div>

            <div id="empty-state"
                class="hidden rounded-lg border border-dashed border-[#d9c3c5] bg-white py-10 text-center text-[#a67b82] text-sm">
                No tasks yet. Add one to get started.
            </div>
        </section>

        <div class="flex items-center justify-between pb-10">
            <p class="text-sm text-[#a67b82]" id="task-count">0 tasks</p>
            <div class="flex gap-3">
                <button type="button" id="preview-json"
                    class="rounded-md border border-[#d9c3c5] bg-white text-[#3a2226] text-sm font-medium px-4 py-2 hover:bg-[#f7eaeb] transition-colors">
                    Preview data
                </button>
                <button type="button" id="save-all"
                    class="rounded-md bg-[#b3122f] text-white text-sm font-medium px-5 py-2 hover:bg-[#8e0f26] transition-colors">
                    Save changes
                </button>
            </div>
        </div>

        <pre id="json-output" class="hidden mono text-xs bg-[#140a0d] text-[#ff8fa3] rounded-lg p-4 overflow-x-auto">
        </pre>

    </main>

    <template id="task-template">
        <div class="task-card bg-white rounded-lg border border-[#e8d9da] shadow-sm">
            <div
                class="px-6 py-3 border-b border-[#e8d9da] flex items-center justify-between bg-[#f7eaeb] rounded-t-lg">
                <h3 class="font-medium text-[#1c1113] text-sm">Task <span class="task-index mono text-[#a67b82]"></span>
                </h3>
                <button type="button"
                    class="remove-task text-xs font-medium text-[#b3122f] hover:text-[#7a0d21]">Remove</button>
            </div>

            <div class="p-6 grid grid-cols-1 sm:grid-cols-2 gap-x-6 gap-y-5">

                <div>
                    <label class="block text-sm font-medium text-[#3a2226] mb-1">Type</label>
                    <select data-field="type"
                        class="w-full rounded-md border border-[#d9c3c5] px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#b3122f] focus:border-[#b3122f]">
                        <option value="">Select type</option>
                        <option value="load">Load</option>
                        <option value="unload">Unload</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-[#3a2226] mb-1">Tank status</label>
                    <select data-field="tank_status"
                        class="w-full rounded-md border border-[#d9c3c5] px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#b3122f] focus:border-[#b3122f]">
                        <option value="">Select status</option>
                        <option value="empty">Empty</option>
                        <option value="full">Full</option>
                        <option value="partial">Partial</option>
                        <option value="cleaned">Cleaned</option>
                    </select>
                </div>

                <div class="sm:col-span-2">
                    <label class="block text-sm font-medium text-[#3a2226] mb-1">Content</label>
                    <input data-field="content" type="text" placeholder="What is being transported"
                        class="w-full rounded-md border border-[#d9c3c5] px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#b3122f] focus:border-[#b3122f]" />
                </div>

                <div>
                    <label class="block text-sm font-medium text-[#3a2226] mb-1">Customer reference</label>
                    <input data-field="customer_ref" type="text"
                        class="w-full rounded-md border border-[#d9c3c5] px-3 py-2 text-sm mono focus:outline-none focus:ring-2 focus:ring-[#b3122f] focus:border-[#b3122f]" />
                </div>

                <div>
                    <label class="block text-sm font-medium text-[#3a2226] mb-1">Load reference</label>
                    <input data-field="load_ref" type="text"
                        class="w-full rounded-md border border-[#d9c3c5] px-3 py-2 text-sm mono focus:outline-none focus:ring-2 focus:ring-[#b3122f] focus:border-[#b3122f]" />
                </div>

                <div>
                    <label class="block text-sm font-medium text-[#3a2226] mb-1">Load start</label>
                    <input data-field="load_start_date" type="datetime-local"
                        class="w-full rounded-md border border-[#d9c3c5] px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#b3122f] focus:border-[#b3122f]" />
                </div>

                <div>
                    <label class="block text-sm font-medium text-[#3a2226] mb-1">Load end</label>
                    <input data-field="load_end_date" type="datetime-local"
                        class="w-full rounded-md border border-[#d9c3c5] px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#b3122f] focus:border-[#b3122f]" />
                </div>

                <div>
                    <label class="block text-sm font-medium text-[#3a2226] mb-1">Unload reference</label>
                    <input data-field="unload_ref" type="text"
                        class="w-full rounded-md border border-[#d9c3c5] px-3 py-2 text-sm mono focus:outline-none focus:ring-2 focus:ring-[#b3122f] focus:border-[#b3122f]" />
                </div>

                <div>
                    <label class="block text-sm font-medium text-[#3a2226] mb-1">Unload start</label>
                    <input data-field="unload_start_date" type="datetime-local"
                        class="w-full rounded-md border border-[#d9c3c5] px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#b3122f] focus:border-[#b3122f]" />
                </div>

                <div>
                    <label class="block text-sm font-medium text-[#3a2226] mb-1">Unload end</label>
                    <input data-field="unload_end_date" type="datetime-local"
                        class="w-full rounded-md border border-[#d9c3c5] px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#b3122f] focus:border-[#b3122f]" />
                </div>

                <div class="sm:col-span-2 border-t border-[#f0e2e3] pt-5">
                    <p class="text-xs font-semibold uppercase tracking-wide text-[#a67b82] mb-3">Cargo</p>
                </div>

                <div>
                    <label class="block text-sm font-medium text-[#3a2226] mb-1">Product</label>
                    <input data-field="product" type="text"
                        class="w-full rounded-md border border-[#d9c3c5] px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#b3122f] focus:border-[#b3122f]" />
                </div>

                <div>
                    <label class="block text-sm font-medium text-[#3a2226] mb-1">Compartment</label>
                    <input data-field="compartment" type="number"
                        class="w-full rounded-md border border-[#d9c3c5] px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#b3122f] focus:border-[#b3122f]" />
                </div>

                <div>
                    <label class="block text-sm font-medium text-[#3a2226] mb-1">Weight</label>
                    <input data-field="weight" type="text" placeholder="e.g. 12500 kg"
                        class="w-full rounded-md border border-[#d9c3c5] px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#b3122f] focus:border-[#b3122f]" />
                </div>

                <div>
                    <label class="block text-sm font-medium text-[#3a2226] mb-1">Volume</label>
                    <input data-field="volume" type="text" placeholder="e.g. 24000 L"
                        class="w-full rounded-md border border-[#d9c3c5] px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#b3122f] focus:border-[#b3122f]" />
                </div>

                <div>
                    <label class="block text-sm font-medium text-[#3a2226] mb-1">Temperature</label>
                    <input data-field="temperature" type="text" placeholder="e.g. 18°C"
                        class="w-full rounded-md border border-[#d9c3c5] px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#b3122f] focus:border-[#b3122f]" />
                </div>

                <div class="sm:col-span-2 border-t border-[#f0e2e3] pt-5">
                    <p class="text-xs font-semibold uppercase tracking-wide text-[#a67b82] mb-3">Locations</p>
                </div>

                <div class="sm:col-span-2">
                    <label class="block text-sm font-medium text-[#3a2226] mb-1">Address</label>
                    <input data-field="address" type="text"
                        class="w-full rounded-md border border-[#d9c3c5] px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#b3122f] focus:border-[#b3122f]" />
                </div>

                <div class="sm:col-span-2">
                    <label class="block text-sm font-medium text-[#3a2226] mb-1">Destination address</label>
                    <input data-field="destination_address" type="text"
                        class="w-full rounded-md border border-[#d9c3c5] px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#b3122f] focus:border-[#b3122f]" />
                </div>

                <div class="sm:col-span-2">
                    <label class="block text-sm font-medium text-[#3a2226] mb-1">Original address</label>
                    <input data-field="original_address" type="text" placeholder="Only if the address was changed"
                        class="w-full rounded-md border border-[#d9c3c5] px-3 py-2 text-sm text-[#6b4a4e] focus:outline-none focus:ring-2 focus:ring-[#b3122f] focus:border-[#b3122f]" />
                </div>

                <div class="sm:col-span-2 border-t border-[#f0e2e3] pt-5">
                    <p class="text-xs font-semibold uppercase tracking-wide text-[#a67b82] mb-3">Live tracking</p>
                </div>

                <div>
                    <label class="block text-sm font-medium text-[#3a2226] mb-1">Current kilometrage</label>
                    <input data-field="current_kilometrage" type="number"
                        class="w-full rounded-md border border-[#d9c3c5] px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#b3122f] focus:border-[#b3122f]" />
                </div>

                <div>
                    <label class="block text-sm font-medium text-[#3a2226] mb-1">Current weight</label>
                    <input data-field="current_weight" type="number"
                        class="w-full rounded-md border border-[#d9c3c5] px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#b3122f] focus:border-[#b3122f]" />
                </div>

                <div>
                    <label class="block text-sm font-medium text-[#3a2226] mb-1">Current temperature</label>
                    <input data-field="current_temperature" type="number" step="0.1"
                        class="w-full rounded-md border border-[#d9c3c5] px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#b3122f] focus:border-[#b3122f]" />
                </div>

                <div>
                    <label class="block text-sm font-medium text-[#3a2226] mb-1">Edit status</label>
                    <select data-field="edit_status"
                        class="w-full rounded-md border border-[#d9c3c5] px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#b3122f] focus:border-[#b3122f]">
                        <option value="original">Original</option>
                        <option value="edited">Edited</option>
                        <option value="cancelled">Cancelled</option>
                    </select>
                </div>

                <div class="sm:col-span-2 border-t border-[#f0e2e3] pt-5">
                    <p class="text-xs font-semibold uppercase tracking-wide text-[#a67b82] mb-3">Timing</p>
                </div>

                <div>
                    <label class="block text-sm font-medium text-[#3a2226] mb-1">Start</label>
                    <input data-field="start" type="datetime-local"
                        class="w-full rounded-md border border-[#d9c3c5] px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#b3122f] focus:border-[#b3122f]" />
                </div>

                <div>
                    <label class="block text-sm font-medium text-[#3a2226] mb-1">End</label>
                    <input data-field="end" type="datetime-local"
                        class="w-full rounded-md border border-[#d9c3c5] px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#b3122f] focus:border-[#b3122f]" />
                </div>

                <div class="sm:col-span-2">
                    <label class="block text-sm font-medium text-[#3a2226] mb-1">Remark</label>
                    <textarea data-field="remark" rows="2"
                        class="w-full rounded-md border border-[#d9c3c5] px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#b3122f] focus:border-[#b3122f]"></textarea>
                </div>

            </div>
        </div>
    </template>

    <script>
        const tasksContainer = document.getElementById('tasks-container');
        const taskTemplate = document.getElementById('task-template');
        const emptyState = document.getElementById('empty-state');
        const taskCountLabel = document.getElementById('task-count');
        const tg = window.Telegram.WebApp;
        let taskSeq = 0;

        tg.ready();

        function updateTaskChrome() {
            const cards = tasksContainer.querySelectorAll('.task-card');
            cards.forEach((card, i) => {
                card.querySelector('.task-index').textContent = '#' + (i + 1);
            });
            taskCountLabel.textContent = cards.length + (cards.length === 1 ? ' task' : ' tasks');
            emptyState.classList.toggle('hidden', cards.length !== 0);
        }

        function addTask() {
            taskSeq += 1;
            const node = taskTemplate.content.firstElementChild.cloneNode(true);
            node.dataset.taskSeq = taskSeq;
            node.querySelector('.remove-task').addEventListener('click', () => {
                node.remove();
                updateTaskChrome();
            });
            tasksContainer.appendChild(node);
            updateTaskChrome();
            node.scrollIntoView({behavior: 'smooth', block: 'center'});
        }

        document.getElementById('add-task').addEventListener('click', addTask);

        function collectShipment() {
            const form = document.getElementById('shipment-form');
            const data = {};
            new FormData(form).forEach((value, key) => {data[key] = value;});
            return data;
        }

        function collectTasks() {
            return Array.from(tasksContainer.querySelectorAll('.task-card')).map(card => {
                const task = {};
                card.querySelectorAll('[data-field]').forEach(el => {
                    task[el.dataset.field] = el.value;
                });
                return task;
            });
        }

        document.getElementById('preview-json').addEventListener('click', () => {
            const payload = {shipment: collectShipment(), tasks: collectTasks()};
            const out = document.getElementById('json-output');
            out.textContent = JSON.stringify(payload, null, 2);
            out.classList.remove('hidden');
        });

        document.getElementById('save-all').addEventListener('click', () => {
            const payload = {shipment: collectShipment(), tasks: collectTasks()};
            console.log('Save payload:', payload);
            alert('Ready to save ' + collectTasks().length + ' task(s). Check the console for the full payload — wire this button up to your API call.');
        });

        addTask();
    </script>

</body>

</html>
